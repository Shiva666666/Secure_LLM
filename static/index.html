<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Semantic Firewall Proxy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161922;
      --border: #2a2d3a;
      --text: #e6e8ec;
      --text-muted: #8b8f9a;
      --accent: #6ee7b7;
      --accent-dim: #34d399;
      --danger: #f87171;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
    }
    header p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 48rem;
      margin: 0 auto;
      width: 100%;
    }
    .msg {
      padding: 0.9rem 1.1rem;
      border-radius: var(--radius);
      max-width: 85%;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: var(--bg);
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .msg.error {
      align-self: stretch;
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    .msg .role {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.8;
      margin-bottom: 0.35rem;
    }
    #input-area {
      padding: 1rem 1.5rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    #input-wrap {
      max-width: 48rem;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      padding: 0.65rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    #input:focus { border-color: var(--accent-dim); }
    #input::placeholder { color: var(--text-muted); }
    #send {
      padding: 0.65rem 1.2rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #send:hover { opacity: 0.9; }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Chat — Semantic Firewall Proxy</h1>
    <p>Prompts are checked against malicious patterns before reaching the model.</p>
  </header>
  <div id="messages"></div>
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
      <button id="send" type="button">Send</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');

    let messages = [];
    let sending = false;

    function setStatus(text) { statusEl.textContent = text; }
    function addMessage(role, content, isError = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}${isError ? ' error' : ''}`;
      const roleSpan = document.createElement('div');
      roleSpan.className = 'role';
      roleSpan.textContent = role;
      div.appendChild(roleSpan);
      const body = document.createElement('div');
      body.textContent = content;
      div.appendChild(body);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return body;
    }

    function appendToLastAssistant(content) {
      const last = messagesEl.querySelector('.msg.assistant:last-of-type');
      if (last) {
        const body = last.querySelector('div:last-child');
        if (body) body.textContent += content;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || sending) return;
      inputEl.value = '';
      sending = true;
      sendBtn.disabled = true;
      setStatus('Sending…');
      messages.push({ role: 'user', content: text });
      addMessage('user', text);

      const payload = {
        model: 'local',
        messages: messages.map(m => ({ role: m.role, content: m.content })),
        stream: true
      };

      try {
        const res = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.status === 403) {
          const err = await res.json();
          const msg = err.error || 'Blocked';
          const score = err.similarity_score != null ? ` (similarity: ${err.similarity_score})` : '';
          addMessage('assistant', msg + score, true);
          messages.push({ role: 'assistant', content: msg });
          setStatus('Blocked by firewall.');
          return;
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          addMessage('assistant', err.error || err.detail || `Error ${res.status}`, true);
          setStatus(`Error ${res.status}`);
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullContent = '';
        addMessage('assistant', '');

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6).trim();
              if (data === '[DONE]') continue;
              try {
                const obj = JSON.parse(data);
                const delta = obj.choices?.[0]?.delta?.content;
                if (delta) {
                  fullContent += delta;
                  appendToLastAssistant(delta);
                }
              } catch (_) {}
            }
          }
        }
        messages.push({ role: 'assistant', content: fullContent });
        setStatus('Done.');
      } catch (e) {
        addMessage('assistant', 'Network error: ' + e.message, true);
        setStatus('Request failed.');
      } finally {
        sending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
  </script>
</body>
</html>
